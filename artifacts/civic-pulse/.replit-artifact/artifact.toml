kind = "web"
previewPath = "/"
title = "CivicPulse AI"
version = "1.0.0"
id = "artifacts/civic-pulse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26187

[services.development]
run = "pnpm --filter @workspace/civic-pulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/civic-pulse", "run", "build" ]
publicDir = "artifacts/civic-pulse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26187"
BASE_PATH = "/"
